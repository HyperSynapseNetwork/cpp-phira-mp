name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Linux amd64 — Alpine Docker, native, fast
  # ═══════════════════════════════════════════════════════════════════
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build static binary in Alpine container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            alpine:3.21 \
            sh -c '
              set -ex

              apk add --no-cache \
                build-base make pkgconf cmake linux-headers wget tar xz

              apk add --no-cache boost-dev nlohmann-json

              apk add --no-cache \
                openssl-dev   openssl-libs-static \
                curl-dev      curl-static \
                zlib-dev      zlib-static \
                brotli-dev    brotli-static \
                nghttp2-dev   nghttp2-static

              for pkg in \
                zstd-dev zstd-static \
                libpsl-dev libpsl-static \
                libidn2-dev libidn2-static \
                libunistring-dev libunistring-static \
                c-ares-dev c-ares-static
              do
                apk add --no-cache "$pkg" 2>/dev/null || echo "SKIP: $pkg"
              done

              # ── fmt (no Alpine static package) ──
              cd /tmp
              wget -q https://github.com/fmtlib/fmt/archive/refs/tags/10.2.1.tar.gz -O fmt.tar.gz
              tar xf fmt.tar.gz && cd fmt-10.2.1
              cmake -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_SHARED_LIBS=OFF -DFMT_TEST=OFF -DFMT_DOC=OFF
              cmake --build build -j$(nproc)
              cmake --install build

              # ── spdlog (no Alpine static package) ──
              cd /tmp
              wget -q https://github.com/gabime/spdlog/archive/refs/tags/v1.14.1.tar.gz -O spdlog.tar.gz
              tar xf spdlog.tar.gz && cd spdlog-1.14.1
              cmake -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_SHARED_LIBS=OFF -DSPDLOG_BUILD_EXAMPLE=OFF -DSPDLOG_BUILD_TESTS=OFF \
                -DSPDLOG_FMT_EXTERNAL=ON
              cmake --build build -j$(nproc)
              cmake --install build

              # ── argon2 ──
              cd /tmp
              wget -q https://github.com/P-H-C/phc-winner-argon2/archive/refs/tags/20190702.tar.gz -O argon2.tar.gz
              tar xf argon2.tar.gz && cd phc-winner-argon2-20190702
              cc -std=c89 -O2 -c src/argon2.c -Iinclude -o src/argon2.o
              cc -std=c89 -O2 -c src/core.c -Iinclude -o src/core.o
              cc -std=c89 -O2 -c src/blake2/blake2b.c -Iinclude -o src/blake2/blake2b.o
              cc -std=c89 -O2 -c src/thread.c -Iinclude -o src/thread.o
              cc -std=c89 -O2 -c src/encoding.c -Iinclude -o src/encoding.o
              cc -std=c89 -O2 -c src/ref.c -Iinclude -o src/ref.o
              ar rcs libargon2.a src/argon2.o src/core.o src/blake2/blake2b.o src/thread.o src/encoding.o src/ref.o
              cp libargon2.a /usr/lib/
              cp include/argon2.h /usr/include/
              cat > /usr/lib/pkgconfig/libargon2.pc << PC
          prefix=/usr
          libdir=\${prefix}/lib
          includedir=\${prefix}/include
          Name: libargon2
          Description: Argon2
          Version: 20190702
          Libs: -L\${libdir} -largon2
          Cflags: -I\${includedir}
          PC

              # ── libuuid static ──
              apk add --no-cache util-linux-dev 2>/dev/null || true
              if [ ! -f /usr/lib/libuuid.a ]; then
                cd /tmp
                apk add --no-cache autoconf automake libtool bison
                wget -q https://mirrors.edge.kernel.org/pub/linux/utils/util-linux/v2.40/util-linux-2.40.2.tar.xz -O util-linux.tar.xz
                tar xf util-linux.tar.xz && cd util-linux-2.40.2
                ./configure --disable-all-programs --enable-libuuid \
                  --enable-static --disable-shared --disable-nls --prefix=/usr
                make -j$(nproc) && make install
              fi

              # ── Build ──
              cd /workspace
              make clean
              make -j$(nproc) STATIC=1 LOCALES_DIR=\"./locales\" TARGET=phira-mp-server
              file phira-mp-server
            '

      - name: Package
        run: |
          mkdir -p release/phira-mp-server-linux-amd64
          cp phira-mp-server release/phira-mp-server-linux-amd64/
          cp -r locales release/phira-mp-server-linux-amd64/
          cd release && tar czf phira-mp-server-linux-amd64.tar.gz phira-mp-server-linux-amd64/

      - uses: actions/upload-artifact@v4
        with:
          name: phira-mp-server-linux-amd64
          path: release/phira-mp-server-linux-amd64.tar.gz

  # ═══════════════════════════════════════════════════════════════════
  # Linux arm64 & armhf — cross-compile on ubuntu (NO QEMU)
  #
  # All dependencies are built from source with the cross-compiler.
  # This is much faster than QEMU-emulated Alpine Docker.
  # ═══════════════════════════════════════════════════════════════════
  build-linux-arm:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            artifact: phira-mp-server-linux-arm64
            cross: aarch64-linux-gnu
            cross_pkg: g++-aarch64-linux-gnu
            openssl_target: linux-aarch64
            cmake_system_processor: aarch64
            configure_host: aarch64-linux-gnu
          - arch: armhf
            artifact: phira-mp-server-linux-armhf
            cross: arm-linux-gnueabihf
            cross_pkg: g++-arm-linux-gnueabihf
            openssl_target: linux-armv4
            cmake_system_processor: arm
            configure_host: arm-linux-gnueabihf

    env:
      CROSS: ${{ matrix.cross }}
      PREFIX: ${{ github.workspace }}/sysroot
      NJOBS: 4

    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler and header-only deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross_pkg }} cmake ninja-build pkg-config wget
          # Header-only: architecture-independent, install normally
          sudo apt-get install -y libboost-dev nlohmann-json3-dev

      - name: Prepare sysroot
        run: mkdir -p $PREFIX/lib $PREFIX/include $PREFIX/lib/pkgconfig

      - name: Build zlib
        run: |
          cd /tmp && wget -q https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.gz && tar xf zlib-1.3.1.tar.gz && cd zlib-1.3.1
          CHOST=${{ matrix.cross }} CC=${{ matrix.cross }}-gcc AR=${{ matrix.cross }}-ar RANLIB=${{ matrix.cross }}-ranlib \
            ./configure --static --prefix=$PREFIX
          make -j$NJOBS && make install

      - name: Build OpenSSL
        run: |
          cd /tmp && wget -q https://github.com/openssl/openssl/releases/download/openssl-3.2.1/openssl-3.2.1.tar.gz && tar xf openssl-3.2.1.tar.gz && cd openssl-3.2.1
          ./Configure ${{ matrix.openssl_target }} no-shared no-tests \
            --cross-compile-prefix=${{ matrix.cross }}- \
            --prefix=$PREFIX
          make -j$NJOBS && make install_sw

      - name: Build curl (minimal)
        run: |
          cd /tmp && wget -q https://github.com/curl/curl/releases/download/curl-8_6_0/curl-8.6.0.tar.xz && tar xf curl-8.6.0.tar.xz && cd curl-8.6.0
          cmake -B build -G Ninja \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=${{ matrix.cmake_system_processor }} \
            -DCMAKE_C_COMPILER=${{ matrix.cross }}-gcc \
            -DCMAKE_INSTALL_PREFIX=$PREFIX \
            -DCMAKE_PREFIX_PATH=$PREFIX \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_CURL_EXE=OFF \
            -DBUILD_TESTING=OFF \
            -DCURL_USE_OPENSSL=ON \
            -DOPENSSL_ROOT_DIR=$PREFIX \
            -DCURL_ZLIB=ON \
            -DZLIB_LIBRARY=$PREFIX/lib/libz.a \
            -DZLIB_INCLUDE_DIR=$PREFIX/include \
            -DCURL_USE_LIBSSH2=OFF \
            -DCURL_USE_LIBPSL=OFF \
            -DUSE_LIBIDN2=OFF \
            -DCURL_DISABLE_LDAP=ON \
            -DHTTP_ONLY=OFF
          cmake --build build -j$NJOBS && cmake --install build

      - name: Build fmt
        run: |
          cd /tmp && wget -q https://github.com/fmtlib/fmt/archive/refs/tags/10.2.1.tar.gz -O fmt.tar.gz && tar xf fmt.tar.gz && cd fmt-10.2.1
          cmake -B build -G Ninja \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=${{ matrix.cmake_system_processor }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cross }}-g++ \
            -DCMAKE_INSTALL_PREFIX=$PREFIX \
            -DBUILD_SHARED_LIBS=OFF -DFMT_TEST=OFF -DFMT_DOC=OFF
          cmake --build build -j$NJOBS && cmake --install build

      - name: Build spdlog
        run: |
          cd /tmp && wget -q https://github.com/gabime/spdlog/archive/refs/tags/v1.14.1.tar.gz -O spdlog.tar.gz && tar xf spdlog.tar.gz && cd spdlog-1.14.1
          cmake -B build -G Ninja \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=${{ matrix.cmake_system_processor }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cross }}-g++ \
            -DCMAKE_INSTALL_PREFIX=$PREFIX \
            -DCMAKE_PREFIX_PATH=$PREFIX \
            -DBUILD_SHARED_LIBS=OFF \
            -DSPDLOG_BUILD_EXAMPLE=OFF -DSPDLOG_BUILD_TESTS=OFF \
            -DSPDLOG_FMT_EXTERNAL=ON
          cmake --build build -j$NJOBS && cmake --install build

      - name: Build argon2
        run: |
          cd /tmp && wget -q https://github.com/P-H-C/phc-winner-argon2/archive/refs/tags/20190702.tar.gz -O argon2.tar.gz && tar xf argon2.tar.gz && cd phc-winner-argon2-20190702
          ${{ matrix.cross }}-gcc -std=c89 -O2 -c src/argon2.c -Iinclude -o src/argon2.o
          ${{ matrix.cross }}-gcc -std=c89 -O2 -c src/core.c -Iinclude -o src/core.o
          ${{ matrix.cross }}-gcc -std=c89 -O2 -c src/blake2/blake2b.c -Iinclude -o src/blake2/blake2b.o
          ${{ matrix.cross }}-gcc -std=c89 -O2 -c src/thread.c -Iinclude -o src/thread.o
          ${{ matrix.cross }}-gcc -std=c89 -O2 -c src/encoding.c -Iinclude -o src/encoding.o
          ${{ matrix.cross }}-gcc -std=c89 -O2 -c src/ref.c -Iinclude -o src/ref.o
          ${{ matrix.cross }}-ar rcs $PREFIX/lib/libargon2.a src/argon2.o src/core.o src/blake2/blake2b.o src/thread.o src/encoding.o src/ref.o
          cp include/argon2.h $PREFIX/include/
          cat > $PREFIX/lib/pkgconfig/libargon2.pc << PC
          prefix=$PREFIX
          libdir=\${prefix}/lib
          includedir=\${prefix}/include
          Name: libargon2
          Description: Argon2
          Version: 20190702
          Libs: -L\${libdir} -largon2
          Cflags: -I\${includedir}
          PC

      - name: Build libuuid
        run: |
          cd /tmp && wget -q https://mirrors.edge.kernel.org/pub/linux/utils/util-linux/v2.40/util-linux-2.40.2.tar.xz && tar xf util-linux-2.40.2.tar.xz && cd util-linux-2.40.2
          ./configure --host=${{ matrix.configure_host }} \
            --disable-all-programs --enable-libuuid \
            --enable-static --disable-shared --disable-nls \
            --prefix=$PREFIX
          make -j$NJOBS && make install

      - name: Build phira-mp-server
        run: |
          # Point pkg-config at cross-compiled sysroot
          export PKG_CONFIG_PATH=$PREFIX/lib/pkgconfig:$PREFIX/lib64/pkgconfig
          export PKG_CONFIG_LIBDIR=$PREFIX/lib/pkgconfig

          echo "=== pkg-config --static --libs libcurl ==="
          pkg-config --static --libs libcurl || true
          echo "=== pkg-config --static --libs spdlog ==="
          pkg-config --static --libs spdlog || true

          make -j$NJOBS \
            CXX=${{ matrix.cross }}-g++ \
            STATIC=1 \
            LOCALES_DIR=\"./locales\" \
            TARGET=phira-mp-server

          file phira-mp-server

      - name: Package
        run: |
          mkdir -p release/${{ matrix.artifact }}
          cp phira-mp-server release/${{ matrix.artifact }}/
          cp -r locales release/${{ matrix.artifact }}/
          cd release && tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}.tar.gz

  # ═══════════════════════════════════════════════════════════════════
  # Windows amd64 — MSYS2 UCRT64, dynamic linking, bundle DLLs
  # ═══════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            make
            pkgconf
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-boost
            mingw-w64-ucrt-x86_64-spdlog
            mingw-w64-ucrt-x86_64-fmt
            mingw-w64-ucrt-x86_64-nlohmann-json
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-ntldd

      - name: Install or build argon2
        run: |
          pacman -S --noconfirm mingw-w64-ucrt-x86_64-argon2 2>/dev/null && exit 0

          echo ">> Building argon2 from source"
          cd /tmp
          curl -sL https://github.com/P-H-C/phc-winner-argon2/archive/refs/tags/20190702.tar.gz | tar xz
          cd phc-winner-argon2-20190702
          gcc -std=c89 -O2 -c src/argon2.c      -Iinclude -o src/argon2.o
          gcc -std=c89 -O2 -c src/core.c        -Iinclude -o src/core.o
          gcc -std=c89 -O2 -c src/blake2/blake2b.c -Iinclude -o src/blake2/blake2b.o
          gcc -std=c89 -O2 -c src/thread.c      -Iinclude -o src/thread.o
          gcc -std=c89 -O2 -c src/encoding.c    -Iinclude -o src/encoding.o
          gcc -std=c89 -O2 -c src/ref.c         -Iinclude -o src/ref.o
          ar rcs libargon2.a src/argon2.o src/core.o src/blake2/blake2b.o src/thread.o src/encoding.o src/ref.o
          cp libargon2.a /ucrt64/lib/
          cp include/argon2.h /ucrt64/include/
          mkdir -p /ucrt64/lib/pkgconfig
          cat > /ucrt64/lib/pkgconfig/libargon2.pc << 'PC'
          prefix=/ucrt64
          libdir=${prefix}/lib
          includedir=${prefix}/include
          Name: libargon2
          Description: Argon2
          Version: 20190702
          Libs: -L${libdir} -largon2
          Cflags: -I${includedir}
          PC

      - name: Build
        run: |
          make -j$(nproc) \
            TARGET=phira-mp-server.exe \
            LOCALES_DIR=\"./locales\"
          file phira-mp-server.exe

      - name: Collect DLLs and package
        run: |
          DEST=release/phira-mp-server-windows-amd64
          mkdir -p "$DEST"

          cp phira-mp-server.exe "$DEST/"

          # Use ntldd to find all non-system DLL dependencies.
          # ntldd is the reliable way to do this on MSYS2 (avoids ldd quirks).
          # -R = recursive (includes transitive deps)
          echo "=== DLL dependencies ==="
          ntldd -R phira-mp-server.exe

          # Copy every DLL that lives under /ucrt64/
          ntldd -R phira-mp-server.exe | grep -i '\/ucrt64\/' | sed 's/.*=> *//' | sed 's/ *(.*//' | sort -u | while IFS= read -r dll
          do
            dll=$(echo "$dll" | xargs)
            if [ -n "$dll" ] && [ -f "$dll" ]; then
              echo "  COPY: $dll"
              cp "$dll" "$DEST/"
            fi
          done

          cp -r locales "$DEST/"

          echo ""
          echo "=== Final package contents ==="
          ls -la "$DEST/"

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path release/phira-mp-server-windows-amd64 -DestinationPath release/phira-mp-server-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: phira-mp-server-windows-amd64
          path: release/phira-mp-server-windows-amd64.zip

  # ═══════════════════════════════════════════════════════════════════
  # Release
  # ═══════════════════════════════════════════════════════════════════
  release:
    needs: [build-linux-amd64, build-linux-arm, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - run: find artifacts -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/phira-mp-server-linux-amd64/*.tar.gz
            artifacts/phira-mp-server-linux-arm64/*.tar.gz
            artifacts/phira-mp-server-linux-armhf/*.tar.gz
            artifacts/phira-mp-server-windows-amd64/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
