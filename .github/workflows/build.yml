name: Makefile CI
on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Linux builds — Alpine Docker for fully-static musl binaries
  #
  # Alpine splits static libs into separate *-static packages.
  # Every -l<foo> used at link time needs the corresponding .a file.
  # ═══════════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            artifact: phira-mp-server-linux-amd64
          - arch: arm64
            platform: linux/arm64
            artifact: phira-mp-server-linux-arm64
          - arch: armhf
            platform: linux/arm/v7
            artifact: phira-mp-server-linux-armhf

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-architecture builds)
        if: matrix.arch != 'amd64'
        uses: docker/setup-qemu-action@v3

      - name: Build static binary in Alpine container
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            alpine:3.21 \
            sh -c '
              set -ex

              # ── Core build tools ──
              apk add --no-cache \
                build-base make pkgconf linux-headers

              # ── Dev packages (headers + .so symlinks) ──
              apk add --no-cache \
                boost-dev \
                spdlog-dev \
                fmt-dev \
                nlohmann-json \
                openssl-dev \
                curl-dev \
                argon2-dev \
                util-linux-dev \
                zlib-dev \
                brotli-dev \
                nghttp2-dev \
                zstd-dev

              # ── Matching -static packages (provides .a files) ──
              # These are REQUIRED for -static linking on Alpine.
              apk add --no-cache \
                openssl-libs-static \
                curl-static \
                zlib-static \
                brotli-static \
                nghttp2-static \
                zstd-static \
                spdlog-static \
                fmt-static

              # ── Optional -static packages (may not exist on all Alpine versions) ──
              # Each installed individually so a missing one does not block the rest.
              for pkg in \
                argon2-static \
                util-linux-static \
                libpsl-dev libpsl-static \
                libidn2-dev libidn2-static \
                libunistring-dev libunistring-static \
                c-ares-dev c-ares-static
              do
                apk add --no-cache "$pkg" 2>/dev/null || echo "SKIP (not found): $pkg"
              done

              # ── Diagnostics ──
              echo "===== pkg-config --static --libs libcurl ====="
              pkg-config --static --libs libcurl || true
              echo "===== pkg-config --static --libs spdlog ====="
              pkg-config --static --libs spdlog || true
              echo "===== Checking .a files ====="
              ls /usr/lib/libspdlog.a /usr/lib/libfmt.a /usr/lib/libargon2.a /usr/lib/libuuid.a 2>&1 || true
              ls /usr/lib/libcurl.a /usr/lib/libssl.a /usr/lib/libcrypto.a /usr/lib/libz.a 2>&1 || true

              # ── If argon2 static lib is still missing, build from source ──
              if [ ! -f /usr/lib/libargon2.a ]; then
                echo ">> Building libargon2.a from source"
                cd /tmp
                wget -q https://github.com/P-H-C/phc-winner-argon2/archive/refs/tags/20190702.tar.gz
                tar xf 20190702.tar.gz && cd phc-winner-argon2-20190702
                make -j$(nproc) LIBRARY_REL=lib ARGON2_BUILD_DIR=/usr install
                cd /workspace
              fi

              # ── If libuuid static lib is still missing, build from source ──
              if [ ! -f /usr/lib/libuuid.a ]; then
                echo ">> Building libuuid.a from source"
                cd /tmp
                apk add --no-cache autoconf automake libtool gettext-dev
                wget -q https://mirrors.edge.kernel.org/pub/linux/utils/util-linux/v2.40/util-linux-2.40.tar.xz
                tar xf util-linux-2.40.tar.xz && cd util-linux-2.40
                ./configure --disable-all-programs --enable-libuuid --enable-static --disable-shared --prefix=/usr
                make -j$(nproc) && make install
                cd /workspace
              fi

              # ── Build the project ──
              make clean
              make -j$(nproc) \
                STATIC=1 \
                LOCALES_DIR=\"./locales\" \
                TARGET=phira-mp-server

              # ── Verify ──
              file phira-mp-server
              ls -lh phira-mp-server
            '

      - name: Package artifact
        run: |
          mkdir -p release/${{ matrix.artifact }}
          cp phira-mp-server release/${{ matrix.artifact }}/
          cp -r locales release/${{ matrix.artifact }}/
          cd release
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}.tar.gz

  # ═══════════════════════════════════════════════════════════════════
  # Windows amd64 — MSYS2 UCRT64, dynamic linking, bundle DLLs
  # ═══════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            make
            pkgconf
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-boost
            mingw-w64-ucrt-x86_64-spdlog
            mingw-w64-ucrt-x86_64-fmt
            mingw-w64-ucrt-x86_64-nlohmann-json
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-openssl

      - name: Install or build argon2
        run: |
          # Try installing from MSYS2 repo first
          pacman -S --noconfirm mingw-w64-ucrt-x86_64-argon2 2>/dev/null && exit 0

          echo ">> argon2 not in repo, building from source"
          cd /tmp
          curl -sL https://github.com/P-H-C/phc-winner-argon2/archive/refs/tags/20190702.tar.gz | tar xz
          cd phc-winner-argon2-20190702
          gcc -std=c89 -O2 -c src/argon2.c -Iinclude -o src/argon2.o
          gcc -std=c89 -O2 -c src/core.c -Iinclude -o src/core.o
          gcc -std=c89 -O2 -c src/blake2/blake2b.c -Iinclude -o src/blake2/blake2b.o
          gcc -std=c89 -O2 -c src/thread.c -Iinclude -o src/thread.o
          gcc -std=c89 -O2 -c src/encoding.c -Iinclude -o src/encoding.o
          gcc -std=c89 -O2 -c src/ref.c -Iinclude -o src/ref.o
          ar rcs libargon2.a src/argon2.o src/core.o src/blake2/blake2b.o src/thread.o src/encoding.o src/ref.o
          cp libargon2.a /ucrt64/lib/
          cp include/argon2.h /ucrt64/include/
          # Create a pkg-config file
          cat > /ucrt64/lib/pkgconfig/libargon2.pc << 'PC'
          prefix=/ucrt64
          libdir=${prefix}/lib
          includedir=${prefix}/include

          Name: libargon2
          Description: Argon2 password hashing library
          Version: 20190702
          Libs: -L${libdir} -largon2
          Cflags: -I${includedir}
          PC

      - name: Build
        run: |
          echo "===== pkg-config diagnostics ====="
          pkg-config --list-all | grep -iE "argon|spdlog|curl|openssl|nlohmann" || true
          echo "===== LIBS from pkg-config ====="
          pkg-config --libs spdlog libargon2 nlohmann_json openssl libcurl 2>&1 || true

          make -j$(nproc) \
            TARGET=phira-mp-server.exe \
            LOCALES_DIR=\"./locales\"

          file phira-mp-server.exe
          ls -lh phira-mp-server.exe

      - name: Collect DLLs and package
        run: |
          mkdir -p release/phira-mp-server-windows-amd64

          cp phira-mp-server.exe release/phira-mp-server-windows-amd64/

          # Collect every UCRT64 DLL the exe depends on (recursively)
          collect_dlls() {
            local binary="$1"
            ldd "$binary" 2>/dev/null | grep -i '/ucrt64/' | awk '{print $3}' | while read -r dll; do
              local base=$(basename "$dll")
              if [ ! -f "release/phira-mp-server-windows-amd64/$base" ] && [ -f "$dll" ]; then
                cp "$dll" release/phira-mp-server-windows-amd64/
                # Recurse to catch transitive dependencies
                collect_dlls "$dll"
              fi
            done
          }
          collect_dlls phira-mp-server.exe

          cp -r locales release/phira-mp-server-windows-amd64/

          echo "===== Package contents ====="
          ls -la release/phira-mp-server-windows-amd64/

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path release/phira-mp-server-windows-amd64 -DestinationPath release/phira-mp-server-windows-amd64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: phira-mp-server-windows-amd64
          path: release/phira-mp-server-windows-amd64.zip

  # ═══════════════════════════════════════════════════════════════════
  # Release — create GitHub Release when a tag is pushed
  # ═══════════════════════════════════════════════════════════════════
  release:
    needs: [build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/phira-mp-server-linux-amd64/*.tar.gz
            artifacts/phira-mp-server-linux-arm64/*.tar.gz
            artifacts/phira-mp-server-linux-armhf/*.tar.gz
            artifacts/phira-mp-server-windows-amd64/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
