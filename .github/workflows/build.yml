name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Linux amd64 — Alpine Docker (musl libc, native, fast)
  #
  # glibc -static triggers SIGFPE (div-by-zero in TLS init on dlopen).
  # musl libc is designed for static linking and doesn't have this bug.
  # ═══════════════════════════════════════════════════════════════════
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build in Alpine
        run: |
          docker run --rm -v "${{ github.workspace }}:/w" -w /w alpine:3.21 sh -c '
            set -ex
            apk add --no-cache build-base make pkgconf cmake ninja linux-headers git
            apk add --no-cache boost-dev nlohmann-json
            apk add --no-cache openssl-dev openssl-libs-static zlib-dev zlib-static

            PREFIX=/opt/deps; mkdir -p $PREFIX/lib/pkgconfig $PREFIX/include

            # ── curl (minimal: OpenSSL+zlib, no SSH/LDAP/GSSAPI) ──
            cd /tmp && git clone --depth 1 --branch curl-8_6_0 https://github.com/curl/curl.git && cd curl
            cmake -B b -G Ninja -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DBUILD_SHARED_LIBS=OFF -DBUILD_CURL_EXE=OFF -DBUILD_TESTING=OFF \
              -DCURL_USE_OPENSSL=ON -DCURL_ZLIB=ON \
              -DCURL_USE_LIBSSH2=OFF -DCURL_USE_LIBSSH=OFF -DCURL_USE_LIBPSL=OFF \
              -DUSE_LIBIDN2=OFF -DCURL_DISABLE_LDAP=ON -DCURL_DISABLE_LDAPS=ON \
              -DUSE_NGHTTP2=OFF -DCURL_USE_GSSAPI=OFF -DENABLE_ARES=OFF
            cmake --build b -j$(nproc) && cmake --install b

            # ── fmt ──
            cd /tmp && git clone --depth 1 --branch 10.2.1 https://github.com/fmtlib/fmt.git && cd fmt
            cmake -B b -G Ninja -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DBUILD_SHARED_LIBS=OFF -DFMT_TEST=OFF -DFMT_DOC=OFF
            cmake --build b -j$(nproc) && cmake --install b

            # ── spdlog ──
            cd /tmp && git clone --depth 1 --branch v1.14.1 https://github.com/gabime/spdlog.git && cd spdlog
            cmake -B b -G Ninja -DCMAKE_INSTALL_PREFIX=$PREFIX -DCMAKE_PREFIX_PATH=$PREFIX \
              -DBUILD_SHARED_LIBS=OFF -DSPDLOG_BUILD_EXAMPLE=OFF -DSPDLOG_BUILD_TESTS=OFF \
              -DSPDLOG_FMT_EXTERNAL=ON
            cmake --build b -j$(nproc) && cmake --install b

            # ── argon2 ──
            cd /tmp && git clone --depth 1 https://github.com/P-H-C/phc-winner-argon2.git && cd phc-winner-argon2
            cc -std=c89 -O2 -c src/argon2.c -Iinclude -o a.o
            cc -std=c89 -O2 -c src/core.c -Iinclude -o b.o
            cc -std=c89 -O2 -c src/blake2/blake2b.c -Iinclude -o c.o
            cc -std=c89 -O2 -c src/thread.c -Iinclude -o d.o
            cc -std=c89 -O2 -c src/encoding.c -Iinclude -o e.o
            cc -std=c89 -O2 -c src/ref.c -Iinclude -o f.o
            ar rcs $PREFIX/lib/libargon2.a a.o b.o c.o d.o e.o f.o
            cp include/argon2.h $PREFIX/include/

            # ── libuuid ──
            apk add --no-cache util-linux-dev 2>/dev/null || true
            if [ ! -f /usr/lib/libuuid.a ]; then
              cd /tmp && apk add --no-cache autoconf automake libtool bison
              wget -q https://mirrors.edge.kernel.org/pub/linux/utils/util-linux/v2.40/util-linux-2.40.2.tar.xz
              tar xf util-linux-2.40.2.tar.xz && cd util-linux-2.40.2
              ./configure --disable-all-programs --enable-libuuid --enable-static --disable-shared --disable-nls --prefix=/usr
              make -j$(nproc) && make install
            fi

            # ── Build ──
            cd /w && make clean
            make -j$(nproc) \
              STATIC=1 LOCALES_DIR=./locales TARGET=phira-mp-server \
              CXXFLAGS="-std=c++20 -Wall -Wextra -O2 -pthread -DLOCALES_DIR=./locales -DSPDLOG_FMT_EXTERNAL -DSPDLOG_COMPILED_LIB -I$PREFIX/include" \
              LDFLAGS="-static -L$PREFIX/lib" \
              LIBS="-lspdlog -lfmt -lcurl -lssl -lcrypto -largon2 -luuid -lz -lpthread"
            file phira-mp-server && ls -lh phira-mp-server
          '
      - name: Package
        run: |
          mkdir -p release/phira-mp-server-linux-amd64
          cp phira-mp-server release/phira-mp-server-linux-amd64/
          cp -r locales release/phira-mp-server-linux-amd64/
          cd release && tar czf phira-mp-server-linux-amd64.tar.gz phira-mp-server-linux-amd64/
      - uses: actions/upload-artifact@v4
        with:
          name: phira-mp-server-linux-amd64
          path: release/phira-mp-server-linux-amd64.tar.gz

  # ═══════════════════════════════════════════════════════════════════
  # Linux arm64 & armhf — musl-cross toolchain (no QEMU, fast)
  #
  # Uses prebuilt musl cross-compilers from musl.cc.
  # All deps built from source. Produces fully static musl binaries.
  # ═══════════════════════════════════════════════════════════════════
  build-linux-arm:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            artifact: phira-mp-server-linux-arm64
            musl_arch: aarch64-linux-musl
            openssl_target: linux-aarch64
          - arch: armhf
            artifact: phira-mp-server-linux-armhf
            musl_arch: arm-linux-musleabihf
            openssl_target: linux-armv4

    env:
      CROSS: ${{ matrix.musl_arch }}
      PREFIX: /home/runner/sysroot

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Download musl-cross toolchain
        run: |
          cd /opt
          wget -q "https://musl.cc/${{ matrix.musl_arch }}-cross.tgz"
          tar xf ${{ matrix.musl_arch }}-cross.tgz
          echo "/opt/${{ matrix.musl_arch }}-cross/bin" >> $GITHUB_PATH

      - name: Prepare sysroot
        run: mkdir -p $PREFIX/lib/pkgconfig $PREFIX/include

      - name: Build zlib
        run: |
          cd /tmp && git clone --depth 1 --branch v1.3.1 https://github.com/madler/zlib.git && cd zlib
          CHOST=${CROSS} CC=${CROSS}-gcc AR=${CROSS}-ar RANLIB=${CROSS}-ranlib \
            ./configure --static --prefix=$PREFIX
          make -j$(nproc) && make install

      - name: Build OpenSSL
        run: |
          cd /tmp && git clone --depth 1 --branch openssl-3.2.1 https://github.com/openssl/openssl.git && cd openssl
          ./Configure ${{ matrix.openssl_target }} no-shared no-tests no-dso no-engine \
            --cross-compile-prefix=${CROSS}- --prefix=$PREFIX
          make -j$(nproc) && make install_sw

      - name: Build curl (minimal)
        run: |
          cd /tmp && git clone --depth 1 --branch curl-8_6_0 https://github.com/curl/curl.git && cd curl
          cmake -B b -G Ninja \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_C_COMPILER=${CROSS}-gcc \
            -DCMAKE_INSTALL_PREFIX=$PREFIX -DCMAKE_PREFIX_PATH=$PREFIX \
            -DBUILD_SHARED_LIBS=OFF -DBUILD_CURL_EXE=OFF -DBUILD_TESTING=OFF \
            -DCURL_USE_OPENSSL=ON -DOPENSSL_ROOT_DIR=$PREFIX \
            -DCURL_ZLIB=ON -DZLIB_LIBRARY=$PREFIX/lib/libz.a -DZLIB_INCLUDE_DIR=$PREFIX/include \
            -DCURL_USE_LIBSSH2=OFF -DCURL_USE_LIBSSH=OFF -DCURL_USE_LIBPSL=OFF \
            -DUSE_LIBIDN2=OFF -DCURL_DISABLE_LDAP=ON -DCURL_DISABLE_LDAPS=ON \
            -DUSE_NGHTTP2=OFF -DCURL_USE_GSSAPI=OFF -DENABLE_ARES=OFF
          cmake --build b -j$(nproc) && cmake --install b

      - name: Build fmt
        run: |
          cd /tmp && git clone --depth 1 --branch 10.2.1 https://github.com/fmtlib/fmt.git && cd fmt
          cmake -B b -G Ninja \
            -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_C_COMPILER=${CROSS}-gcc -DCMAKE_CXX_COMPILER=${CROSS}-g++ \
            -DCMAKE_INSTALL_PREFIX=$PREFIX -DBUILD_SHARED_LIBS=OFF -DFMT_TEST=OFF -DFMT_DOC=OFF
          cmake --build b -j$(nproc) && cmake --install b

      - name: Build spdlog
        run: |
          cd /tmp && git clone --depth 1 --branch v1.14.1 https://github.com/gabime/spdlog.git && cd spdlog
          cmake -B b -G Ninja \
            -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_C_COMPILER=${CROSS}-gcc -DCMAKE_CXX_COMPILER=${CROSS}-g++ \
            -DCMAKE_INSTALL_PREFIX=$PREFIX -DCMAKE_PREFIX_PATH=$PREFIX \
            -DBUILD_SHARED_LIBS=OFF -DSPDLOG_BUILD_EXAMPLE=OFF -DSPDLOG_BUILD_TESTS=OFF -DSPDLOG_FMT_EXTERNAL=ON
          cmake --build b -j$(nproc) && cmake --install b

      - name: Build argon2
        run: |
          cd /tmp && git clone --depth 1 https://github.com/P-H-C/phc-winner-argon2.git && cd phc-winner-argon2
          ${CROSS}-gcc -std=c89 -O2 -c src/argon2.c -Iinclude -o a.o
          ${CROSS}-gcc -std=c89 -O2 -c src/core.c -Iinclude -o b.o
          ${CROSS}-gcc -std=c89 -O2 -c src/blake2/blake2b.c -Iinclude -o c.o
          ${CROSS}-gcc -std=c89 -O2 -c src/thread.c -Iinclude -o d.o
          ${CROSS}-gcc -std=c89 -O2 -c src/encoding.c -Iinclude -o e.o
          ${CROSS}-gcc -std=c89 -O2 -c src/ref.c -Iinclude -o f.o
          ${CROSS}-ar rcs $PREFIX/lib/libargon2.a a.o b.o c.o d.o e.o f.o
          cp include/argon2.h $PREFIX/include/

      - name: Build libuuid
        run: |
          sudo apt-get install -y autoconf automake libtool bison
          cd /tmp && wget -q https://mirrors.edge.kernel.org/pub/linux/utils/util-linux/v2.40/util-linux-2.40.2.tar.xz
          tar xf util-linux-2.40.2.tar.xz && cd util-linux-2.40.2
          ./configure --host=${CROSS} --disable-all-programs --enable-libuuid \
            --enable-static --disable-shared --disable-nls --prefix=$PREFIX
          make -j$(nproc) && make install

      - name: Build phira-mp-server
        run: |
          make -j$(nproc) \
            CXX="${CROSS}-g++" \
            TARGET=phira-mp-server \
            CXXFLAGS="-std=c++20 -Wall -Wextra -O2 -pthread \
              -DLOCALES_DIR=./locales -DSPDLOG_FMT_EXTERNAL -DSPDLOG_COMPILED_LIB \
              -I${PREFIX}/include" \
            LDFLAGS="-static -L${PREFIX}/lib" \
            LIBS="-lspdlog -lfmt -lcurl -lssl -lcrypto -largon2 -luuid -lz -lpthread"
          file phira-mp-server && ls -lh phira-mp-server

      - name: Package
        run: |
          mkdir -p release/${{ matrix.artifact }}
          cp phira-mp-server release/${{ matrix.artifact }}/
          cp -r locales release/${{ matrix.artifact }}/
          cd release && tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}.tar.gz

  # ═══════════════════════════════════════════════════════════════════
  # Windows amd64 — MSYS2 UCRT64, dynamic linking, bundle DLLs
  # ═══════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            make pkgconf
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-boost
            mingw-w64-ucrt-x86_64-spdlog
            mingw-w64-ucrt-x86_64-fmt
            mingw-w64-ucrt-x86_64-nlohmann-json
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-ntldd

      - name: Install or build argon2
        run: |
          pacman -S --noconfirm mingw-w64-ucrt-x86_64-argon2 2>/dev/null && exit 0
          echo ">> Building argon2 from source"
          cd /tmp && curl -sL https://github.com/P-H-C/phc-winner-argon2/archive/refs/tags/20190702.tar.gz | tar xz
          cd phc-winner-argon2-20190702
          gcc -std=c89 -O2 -c src/argon2.c -Iinclude -o a.o
          gcc -std=c89 -O2 -c src/core.c -Iinclude -o b.o
          gcc -std=c89 -O2 -c src/blake2/blake2b.c -Iinclude -o c.o
          gcc -std=c89 -O2 -c src/thread.c -Iinclude -o d.o
          gcc -std=c89 -O2 -c src/encoding.c -Iinclude -o e.o
          gcc -std=c89 -O2 -c src/ref.c -Iinclude -o f.o
          ar rcs libargon2.a a.o b.o c.o d.o e.o f.o
          cp libargon2.a /ucrt64/lib/
          cp include/argon2.h /ucrt64/include/
          mkdir -p /ucrt64/lib/pkgconfig
          printf 'prefix=/ucrt64\nlibdir=${prefix}/lib\nincludedir=${prefix}/include\n\nName: libargon2\nDescription: Argon2\nVersion: 20190702\nLibs: -L${libdir} -largon2\nCflags: -I${includedir}\n' \
            > /ucrt64/lib/pkgconfig/libargon2.pc

      - name: Build
        run: |
          make -j$(nproc) TARGET=phira-mp-server.exe LOCALES_DIR=./locales
          file phira-mp-server.exe

      - name: Collect DLLs and package
        run: |
          DEST=release/phira-mp-server-windows-amd64
          mkdir -p "$DEST"
          cp phira-mp-server.exe "$DEST/"
          echo "=== Collecting UCRT64 DLLs ==="
          ntldd -R phira-mp-server.exe | grep -i 'ucrt64' | awk '{print $1}' | sort -u | while IFS= read -r d
          do
            d=$(echo "$d" | tr -d '[:space:]')
            [ -n "$d" ] && [ -f "/ucrt64/bin/$d" ] && echo "  COPY: $d" && cp "/ucrt64/bin/$d" "$DEST/"
          done
          cp -r locales "$DEST/"
          echo "=== Package contents ==="
          ls -la "$DEST/"

      - name: Create zip
        shell: pwsh
        run: Compress-Archive -Path release/phira-mp-server-windows-amd64 -DestinationPath release/phira-mp-server-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: phira-mp-server-windows-amd64
          path: release/phira-mp-server-windows-amd64.zip

  # ═══════════════════════════════════════════════════════════════════
  release:
    needs: [build-linux-amd64, build-linux-arm, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: find artifacts -type f | sort
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/phira-mp-server-linux-amd64/*.tar.gz
            artifacts/phira-mp-server-linux-arm64/*.tar.gz
            artifacts/phira-mp-server-linux-armhf/*.tar.gz
            artifacts/phira-mp-server-windows-amd64/*.zip
          generate_release_notes: true
