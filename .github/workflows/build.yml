name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Linux builds — use Alpine Docker for reliable static linking
  # Alpine uses musl libc and provides *-static packages, making
  # fully static binaries straightforward.
  # ═══════════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            artifact: phira-mp-server-linux-amd64
          - arch: arm64
            platform: linux/arm64
            artifact: phira-mp-server-linux-arm64
          - arch: armhf
            platform: linux/arm/v7
            artifact: phira-mp-server-linux-armhf

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-architecture builds)
        if: matrix.arch != 'amd64'
        uses: docker/setup-qemu-action@v3

      - name: Build static binary in Alpine container
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            alpine:3.21 \
            sh -c '
              set -ex

              # ── Install build dependencies ──
              apk add --no-cache \
                build-base make pkgconf \
                boost-dev \
                spdlog-dev fmt-dev \
                nlohmann-json \
                openssl-dev openssl-libs-static \
                curl-dev curl-static \
                argon2-dev \
                util-linux-dev \
                zlib-static \
                brotli-static \
                nghttp2-static \
                c-ares-static \
                libidn2-static libunistring-static \
                linux-headers

              # ── Check what static libcurl needs ──
              echo "=== pkg-config --static --libs libcurl ==="
              pkg-config --static --libs libcurl || true

              # ── Build with LOCALES_DIR set to relative path ──
              make clean
              make -j$(nproc) \
                STATIC=1 \
                LOCALES_DIR=\"./locales\" \
                TARGET=phira-mp-server

              # ── Verify the binary ──
              file phira-mp-server
              ls -lh phira-mp-server
            '

      - name: Package artifact
        run: |
          mkdir -p release/${{ matrix.artifact }}
          cp phira-mp-server release/${{ matrix.artifact }}/
          cp -r locales release/${{ matrix.artifact }}/
          cd release
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}.tar.gz

  # ═══════════════════════════════════════════════════════════════════
  # Windows amd64 — cross-compile with MinGW-w64 on Ubuntu
  # ═══════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW-w64 and base tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++-mingw-w64-x86-64 \
            mingw-w64-x86-64-dev \
            mingw-w64-tools \
            make pkg-config \
            cmake ninja-build \
            git ca-certificates \
            python3 perl

      - name: Set MinGW environment
        run: |
          echo "Setting up cross-compilation environment..."
          # Use POSIX threading model
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix 2>/dev/null || true
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix 2>/dev/null || true

          MINGW_PREFIX=/usr/x86_64-w64-mingw32
          BUILD_DIR=${{ github.workspace }}/deps-build
          INSTALL_DIR=${{ github.workspace }}/deps-install

          mkdir -p $BUILD_DIR $INSTALL_DIR/lib $INSTALL_DIR/include

          echo "MINGW_PREFIX=${MINGW_PREFIX}" >> $GITHUB_ENV
          echo "BUILD_DIR=${BUILD_DIR}" >> $GITHUB_ENV
          echo "INSTALL_DIR=${INSTALL_DIR}" >> $GITHUB_ENV
          echo "CROSS_CC=x86_64-w64-mingw32-gcc" >> $GITHUB_ENV
          echo "CROSS_CXX=x86_64-w64-mingw32-g++" >> $GITHUB_ENV

      - name: Build zlib (static, MinGW)
        run: |
          cd $BUILD_DIR
          git clone --depth 1 --branch v1.3.1 https://github.com/madler/zlib.git
          cd zlib
          cmake -B build -G Ninja \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
            -DCMAKE_INSTALL_PREFIX=$INSTALL_DIR \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          cmake --build build --config Release
          cmake --install build

      - name: Build OpenSSL (static, MinGW)
        run: |
          cd $BUILD_DIR
          git clone --depth 1 --branch openssl-3.2.1 https://github.com/openssl/openssl.git
          cd openssl
          ./Configure mingw64 no-shared no-tests \
            --cross-compile-prefix=x86_64-w64-mingw32- \
            --prefix=$INSTALL_DIR \
            --with-zlib-include=$INSTALL_DIR/include \
            --with-zlib-lib=$INSTALL_DIR/lib
          make -j$(nproc)
          make install_sw

      - name: Build libcurl (static, MinGW)
        run: |
          cd $BUILD_DIR
          git clone --depth 1 --branch curl-8_6_0 https://github.com/curl/curl.git
          cd curl
          cmake -B build -G Ninja \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
            -DCMAKE_INSTALL_PREFIX=$INSTALL_DIR \
            -DCMAKE_PREFIX_PATH=$INSTALL_DIR \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_CURL_EXE=OFF \
            -DBUILD_TESTING=OFF \
            -DCURL_USE_OPENSSL=ON \
            -DOPENSSL_ROOT_DIR=$INSTALL_DIR \
            -DCURL_ZLIB=ON \
            -DZLIB_LIBRARY=$INSTALL_DIR/lib/libz.a \
            -DZLIB_INCLUDE_DIR=$INSTALL_DIR/include \
            -DCURL_USE_LIBSSH2=OFF \
            -DCURL_USE_LIBPSL=OFF \
            -DUSE_LIBIDN2=OFF \
            -DCURL_DISABLE_LDAP=ON
          cmake --build build --config Release
          cmake --install build

      - name: Build libargon2 (static, MinGW)
        run: |
          cd $BUILD_DIR
          git clone --depth 1 https://github.com/P-H-C/phc-winner-argon2.git argon2
          cd argon2
          # Build static library with MinGW
          x86_64-w64-mingw32-gcc -std=c89 -O2 -c src/argon2.c -Iinclude -o src/argon2.o
          x86_64-w64-mingw32-gcc -std=c89 -O2 -c src/core.c -Iinclude -o src/core.o
          x86_64-w64-mingw32-gcc -std=c89 -O2 -c src/blake2/blake2b.c -Iinclude -o src/blake2/blake2b.o
          x86_64-w64-mingw32-gcc -std=c89 -O2 -c src/thread.c -Iinclude -o src/thread.o
          x86_64-w64-mingw32-gcc -std=c89 -O2 -c src/encoding.c -Iinclude -o src/encoding.o
          x86_64-w64-mingw32-gcc -std=c89 -O2 -c src/ref.c -Iinclude -o src/ref.o
          x86_64-w64-mingw32-ar rcs libargon2.a src/argon2.o src/core.o src/blake2/blake2b.o src/thread.o src/encoding.o src/ref.o
          cp libargon2.a $INSTALL_DIR/lib/
          cp include/argon2.h $INSTALL_DIR/include/

      - name: Install header-only libraries (Boost, spdlog, nlohmann_json, fmt)
        run: |
          cd $BUILD_DIR

          # Boost (header-only subset: Asio + Beast)
          git clone --depth 1 --branch boost-1.84.0 --recurse-submodules \
            https://github.com/boostorg/boost.git
          cd boost
          ./bootstrap.sh
          ./b2 headers
          cp -r boost $INSTALL_DIR/include/
          cd ..

          # fmt
          git clone --depth 1 --branch 10.2.1 https://github.com/fmtlib/fmt.git
          cd fmt
          cmake -B build -G Ninja \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ \
            -DCMAKE_INSTALL_PREFIX=$INSTALL_DIR \
            -DBUILD_SHARED_LIBS=OFF \
            -DFMT_TEST=OFF \
            -DFMT_DOC=OFF
          cmake --build build --config Release
          cmake --install build
          cd ..

          # spdlog (compiled, links to fmt)
          git clone --depth 1 --branch v1.13.0 https://github.com/gabime/spdlog.git
          cd spdlog
          cmake -B build -G Ninja \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ \
            -DCMAKE_INSTALL_PREFIX=$INSTALL_DIR \
            -DCMAKE_PREFIX_PATH=$INSTALL_DIR \
            -DBUILD_SHARED_LIBS=OFF \
            -DSPDLOG_BUILD_EXAMPLE=OFF \
            -DSPDLOG_BUILD_TESTS=OFF \
            -DSPDLOG_FMT_EXTERNAL=ON
          cmake --build build --config Release
          cmake --install build
          cd ..

          # nlohmann/json (header-only)
          git clone --depth 1 --branch v3.11.3 https://github.com/nlohmann/json.git
          cd json
          cmake -B build -G Ninja \
            -DCMAKE_INSTALL_PREFIX=$INSTALL_DIR \
            -DJSON_BuildTests=OFF
          cmake --install build
          cd ..

      - name: Build phira-mp-server for Windows
        run: |
          INSTALL_DIR=${{ github.workspace }}/deps-install
          DEPSLIB="$INSTALL_DIR/lib"
          DEPSINC="$INSTALL_DIR/include"

          # Build with explicit paths — no pkg-config for cross-compilation
          make clean
          make -j$(nproc) \
            CXX=x86_64-w64-mingw32-g++ \
            TARGET=phira-mp-server.exe \
            CXXFLAGS="-std=c++20 -Wall -Wextra -O2 -DLOCALES_DIR=\\\"./locales\\\" \
              -I${DEPSINC} -DCURL_STATICLIB -DSPDLOG_FMT_EXTERNAL -DSPDLOG_COMPILED_LIB" \
            LDFLAGS="-static -static-libgcc -static-libstdc++" \
            LIBS="-L${DEPSLIB} \
              -lspdlog -lfmt \
              -lcurl -lssl -lcrypto \
              -largon2 \
              -lz -lws2_32 -lcrypt32 -lwldap32 -lbcrypt \
              -lrpcrt4 -lpthread"

          file phira-mp-server.exe
          ls -lh phira-mp-server.exe

      - name: Package artifact
        run: |
          mkdir -p release/phira-mp-server-windows-amd64
          cp phira-mp-server.exe release/phira-mp-server-windows-amd64/
          cp -r locales release/phira-mp-server-windows-amd64/
          cd release
          zip -r phira-mp-server-windows-amd64.zip phira-mp-server-windows-amd64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: phira-mp-server-windows-amd64
          path: release/phira-mp-server-windows-amd64.zip

  # ═══════════════════════════════════════════════════════════════════
  # Release — create GitHub Release when a tag is pushed
  # ═══════════════════════════════════════════════════════════════════
  release:
    needs: [build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/phira-mp-server-linux-amd64/*.tar.gz
            artifacts/phira-mp-server-linux-arm64/*.tar.gz
            artifacts/phira-mp-server-linux-armhf/*.tar.gz
            artifacts/phira-mp-server-windows-amd64/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
