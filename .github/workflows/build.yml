name: Makefile CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Linux builds — fully static (native amd64 + cross arm64/armhf)
  # ═══════════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            triplet: x86_64-linux-gnu
            pkg_arch: amd64
            cc: gcc
            cxx: g++
          - arch: arm64
            triplet: aarch64-linux-gnu
            pkg_arch: arm64
            cc: aarch64-linux-gnu-gcc
            cxx: aarch64-linux-gnu-g++
          - arch: armhf
            triplet: arm-linux-gnueabihf
            pkg_arch: armhf
            cc: arm-linux-gnueabihf-gcc
            cxx: arm-linux-gnueabihf-g++

    steps:
      - uses: actions/checkout@v4

      - name: Enable multiarch
        if: matrix.arch != 'amd64'
        run: |
          sudo dpkg --add-architecture ${{ matrix.pkg_arch }}

          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i 's/^Types: deb$/Types: deb\nArchitectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources
          fi
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i 's|^deb http|deb [arch=amd64] http|g' /etc/apt/sources.list
          fi

          cat <<EOF | sudo tee /etc/apt/sources.list.d/multiarch.list > /dev/null
          deb [arch=${{ matrix.pkg_arch }}] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse
          deb [arch=${{ matrix.pkg_arch }}] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse
          deb [arch=${{ matrix.pkg_arch }}] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse
          EOF

          sudo apt-get update -qq

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          # Note: we do NOT install libspdlog-dev or libfmt-dev — we build
          # them from source below so that static .a archives exist.
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            sudo apt-get install -y -qq \
              g++ cmake pkg-config \
              libboost-dev libcurl4-openssl-dev libssl-dev \
              libargon2-dev nlohmann-json3-dev uuid-dev \
              zlib1g-dev libnghttp2-dev libbrotli-dev libzstd-dev \
              libpsl-dev libidn2-dev libunistring-dev
          else
            sudo apt-get install -y -qq \
              g++-${{ matrix.triplet }} cmake pkg-config \
              libboost-dev:${{ matrix.pkg_arch }} \
              libcurl4-openssl-dev:${{ matrix.pkg_arch }} \
              libssl-dev:${{ matrix.pkg_arch }} \
              libargon2-dev:${{ matrix.pkg_arch }} \
              nlohmann-json3-dev:${{ matrix.pkg_arch }} \
              uuid-dev:${{ matrix.pkg_arch }} \
              zlib1g-dev:${{ matrix.pkg_arch }} \
              libnghttp2-dev:${{ matrix.pkg_arch }} \
              libbrotli-dev:${{ matrix.pkg_arch }} \
              libzstd-dev:${{ matrix.pkg_arch }} \
              libpsl-dev:${{ matrix.pkg_arch }} \
              libidn2-dev:${{ matrix.pkg_arch }} \
              libunistring-dev:${{ matrix.pkg_arch }}
          fi

      - name: Build fmt & spdlog from source (static)
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          # ── Determine install prefix ──
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            PREFIX=/usr/local
            CMAKE_EXTRA=""
          else
            PREFIX=/usr/${{ matrix.triplet }}
            CMAKE_EXTRA="-DCMAKE_C_COMPILER=${{ matrix.cc }} -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} -DCMAKE_SYSTEM_NAME=Linux"
          fi

          # ── fmt 9.1.0 (matches Ubuntu 24.04 header version) ──
          git clone --depth 1 --branch 9.1.0 https://github.com/fmtlib/fmt.git /tmp/fmt
          cmake -S /tmp/fmt -B /tmp/fmt/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$PREFIX \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DFMT_DOC=OFF -DFMT_TEST=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            $CMAKE_EXTRA
          cmake --build /tmp/fmt/build -j$(nproc)
          sudo cmake --install /tmp/fmt/build

          # ── spdlog 1.12.0 (matches Ubuntu 24.04 header version) ──
          git clone --depth 1 --branch v1.12.0 https://github.com/gabime/spdlog.git /tmp/spdlog
          cmake -S /tmp/spdlog -B /tmp/spdlog/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$PREFIX \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DSPDLOG_BUILD_SHARED=OFF \
            -DSPDLOG_FMT_EXTERNAL=ON \
            -DSPDLOG_BUILD_EXAMPLE=OFF -DSPDLOG_BUILD_TESTS=OFF \
            -DCMAKE_PREFIX_PATH=$PREFIX \
            $CMAKE_EXTRA
          cmake --build /tmp/spdlog/build -j$(nproc)
          sudo cmake --install /tmp/spdlog/build

      - name: Build
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            make -j$(nproc) STATIC=1
          else
            export PKG_CONFIG_LIBDIR=/usr/lib/${{ matrix.triplet }}/pkgconfig:/usr/share/pkgconfig
            export PKG_CONFIG_SYSROOT_DIR=/
            make -j$(nproc) CXX=${{ matrix.cxx }} STATIC=1
          fi
          strip phira-mp-server || ${{ matrix.triplet }}-strip phira-mp-server || true

      - name: Verify static
        run: |
          file phira-mp-server
          ldd phira-mp-server 2>&1 || echo "(expected: not a dynamic executable)"

      - name: Package
        run: |
          mkdir -p dist
          cp phira-mp-server dist/
          cp -r locales dist/
          tar czf phira-mp-server-linux-${{ matrix.arch }}.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: phira-mp-server-linux-${{ matrix.arch }}
          path: phira-mp-server-linux-${{ matrix.arch }}.tar.gz

  # ═══════════════════════════════════════════════════════════════════
  # Windows amd64 build (MSYS2 UCRT64) — dynamic
  # ═══════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-boost
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-spdlog
            mingw-w64-ucrt-x86_64-argon2
            mingw-w64-ucrt-x86_64-nlohmann-json
            mingw-w64-ucrt-x86_64-fmt

      - name: Build
        run: |
          cat > Makefile.win << 'MF'
          CXX      := g++
          CXXFLAGS := -std=c++20 -Wall -Wextra -O2 -pthread -DWIN32_LEAN_AND_MEAN
          CXXFLAGS += -Wno-array-bounds -Wno-stringop-overflow
          INCLUDES := -Iinclude
          CXXFLAGS += $(shell pkg-config --cflags spdlog libargon2 nlohmann_json openssl libcurl 2>/dev/null)
          LIBS := $(shell pkg-config --libs spdlog libargon2 nlohmann_json openssl libcurl 2>/dev/null) \
                  -lfmt -lrpcrt4 -lws2_32 -lwsock32 -lpthread
          SRCS := src/main.cpp src/binary.cpp src/command.cpp src/stream.cpp \
                  src/l10n.cpp src/room.cpp src/session.cpp src/server.cpp \
                  src/http_server.cpp
          OBJS := $(SRCS:.cpp=.o)
          TARGET := phira-mp-server.exe
          LOCALES_DIR := locales
          CXXFLAGS += -DLOCALES_DIR=\"$(LOCALES_DIR)\"
          .PHONY: all clean
          all: $(TARGET)
          $(TARGET): $(OBJS)
          	$(CXX) $(CXXFLAGS) -o $@ $^ $(LIBS)
          src/%.o: src/%.cpp
          	$(CXX) $(CXXFLAGS) $(INCLUDES) -c -o $@ $<
          clean:
          	rm -f $(OBJS) $(TARGET)
          MF
          mingw32-make -f Makefile.win -j$(nproc)
          strip phira-mp-server.exe || true

      - name: Package
        run: |
          mkdir -p dist
          cp phira-mp-server.exe dist/
          cp -r locales dist/
          for dll in $(ldd phira-mp-server.exe 2>/dev/null | grep ucrt64 | awk '{print $3}'); do
            cp "$dll" dist/ 2>/dev/null || true
          done

      - name: Create zip
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath phira-mp-server-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: phira-mp-server-windows-amd64
          path: phira-mp-server-windows-amd64.zip

  # ═══════════════════════════════════════════════════════════════════
  # Upload release artifacts
  # ═══════════════════════════════════════════════════════════════════
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/phira-mp-server-linux-amd64/phira-mp-server-linux-amd64.tar.gz
            artifacts/phira-mp-server-linux-arm64/phira-mp-server-linux-arm64.tar.gz
            artifacts/phira-mp-server-linux-armhf/phira-mp-server-linux-armhf.tar.gz
            artifacts/phira-mp-server-windows-amd64/phira-mp-server-windows-amd64.zip
          generate_release_notes: true
